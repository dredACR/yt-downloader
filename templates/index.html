<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YT Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111111; --border: #222222;
      --red: #ff2d2d; --red-dim: #7a1414; --white: #f0ede8;
      --muted: #555555; --success: #2dff7a;
    }
    body {
      background: var(--bg); color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 60px 20px 80px;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }
    .container { position: relative; z-index: 1; width: 100%; max-width: 680px; }
    header { margin-bottom: 56px; }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: clamp(64px,12vw,96px); line-height: 0.9; color: var(--white); }
    .logo span { color: var(--red); }
    .tagline { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 10px; }
    .card { background: var(--surface); border: 1px solid var(--border); padding: 36px; }
    .url-row { display: flex; border: 1px solid var(--border); transition: border-color .2s; }
    .url-row:focus-within { border-color: var(--red); }
    #url-input { flex: 1; background: transparent; border: none; outline: none; color: var(--white); font-family: 'DM Mono', monospace; font-size: 13px; padding: 14px 16px; }
    #url-input::placeholder { color: var(--muted); }
    #fetch-btn { background: var(--red); border: none; color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; padding: 0 24px; cursor: pointer; transition: background .15s; white-space: nowrap; }
    #fetch-btn:hover { background: #e02020; }
    #fetch-btn:disabled { background: var(--red-dim); cursor: not-allowed; }
    .section-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin: 28px 0 12px; }
    .quality-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .q-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; padding: 8px 16px; cursor: pointer; transition: all .15s; }
    .q-btn:hover { border-color: var(--white); color: var(--white); }
    .q-btn.active { border-color: var(--red); color: var(--red); background: rgba(255,45,45,.06); }
    #download-btn { width: 100%; margin-top: 28px; background: var(--red); border: none; color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; padding: 16px; cursor: pointer; transition: background .15s, opacity .15s; }
    #download-btn:hover { background: #e02020; }
    #download-btn:disabled { opacity: .4; cursor: not-allowed; }
    #progress-block { display: none; margin-top: 24px; }
    #progress-block.visible { display: block; }
    .progress-bar-wrap { height: 3px; background: var(--border); }
    #progress-fill { height: 100%; background: var(--red); width: 0%; transition: width .3s; }
    #progress-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 8px; }
    #error-block { display: none; margin-top: 20px; border: 1px solid var(--red-dim); background: rgba(255,45,45,.04); padding: 14px 18px; }
    #error-block.visible { display: block; }
    #error-text { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--red); }
    footer { margin-top: 48px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; text-align: center; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">YT<span>.</span>DOWN</div>
    <div class="tagline">Завантажте відео з YouTube на ПК</div>
  </header>

  <div class="card">
    <div class="url-row">
      <input id="url-input" type="text" placeholder="https://youtube.com/watch?v=..." autocomplete="off" spellcheck="false"/>
      
    </div>

    <div class="section-label">Якість</div>
    <div class="quality-grid">
      <button class="q-btn active" data-q="720p"  onclick="setQ(this)">720p</button>
      <button class="q-btn"        data-q="480p"  onclick="setQ(this)">480p</button>
      <button class="q-btn"        data-q="360p"  onclick="setQ(this)">360p</button>
      <button class="q-btn"        data-q="audio" onclick="setQ(this)">MP3 аудіо</button>
    </div>

    <button id="download-btn" onclick="startDownload()">⬇ ЗАВАНТАЖИТИ</button>

    <div id="progress-block">
      <div class="progress-bar-wrap"><div id="progress-fill"></div></div>
      <div id="progress-label">Завантаження…</div>
    </div>

    <div id="error-block"><div id="error-text"></div></div>
  </div>

  <footer>Для особистого використання. Спеціально для С.В · Поважайте авторські права</footer>
</div>

<script>
  let selectedQuality = '720p';
  let videoReady = false;

  const $ = id => document.getElementById(id);

  function setQ(btn) {
    document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedQuality = btn.dataset.q;
  }

  function showError(msg) {
    $('error-text').textContent = '⚠ ' + msg;
    $('error-block').classList.add('visible');
  }
  function hideError() { $('error-block').classList.remove('visible'); }

  async function fetchInfo() {
    const url = $('url-input').value.trim();
    if (!url) return;
    hideError();
    const btn = $('fetch-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';
    try {
      const res = await fetch('/api/info', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      const data = await res.json();
      if (data.error) { showError(data.error); return; }
      videoReady = true;
      btn.textContent = '✓ ' + (data.title || 'Готово').slice(0, 30);
    } catch(e) {
      showError('Не вдалось отримати інформацію.');
    } finally {
      btn.disabled = false;
    }
  }

  async function startDownload() {
    const url = $('url-input').value.trim();
    if (!url) return;

    hideError();
    $('download-btn').disabled = true;
    $('progress-block').classList.add('visible');
    $('progress-fill').style.width = '30%';
    $('progress-label').textContent = 'Підготовка файлу на сервері…';

    try {
      const res = await fetch('/api/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          url,
          quality: selectedQuality === 'audio' ? '720p' : selectedQuality,
          audio_only: selectedQuality === 'audio'
        })
      });

      if (!res.ok) {
        const err = await res.json();
        showError(err.error || 'Помилка сервера');
        return;
      }

      $('progress-fill').style.width = '80%';
      $('progress-label').textContent = 'Збереження на ваш ПК…';

      const blob = await res.blob();
      $('progress-fill').style.width = '100%';

      const disposition = res.headers.get('Content-Disposition') || '';
      const match = disposition.match(/filename="(.+?)"/);
      const filename = match ? match[1] : (selectedQuality === 'audio' ? 'audio.mp3' : 'video.mp4');

      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();

      $('progress-label').textContent = '✓ Файл збережено!';

    } catch(e) {
      showError('Помилка зʼєднання з сервером.');
    } finally {
      $('download-btn').disabled = false;
    }
  }

  $('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchInfo();
  });
</script>
</body>
</html>
